<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPOWERED - Authentication</title>

    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script/auth.js"></script>
</head>
<body>

<!-- NAV BAR -->
<nav class="navbar">
  <div class="container navbar-inner" style="justify-content: flex-start;">
    <a href="customer.html" class="nav-logo" style="margin-right: auto;">
      <div class="logo-icon"><i class="fa-solid fa-lightbulb"></i></div>
      EMPOWERED
    </a>
  </div>
</nav>

<!-- AUTH -->
<div class="auth-container">

    <!-- LEFT IMAGE -->
    <div class="auth-left">
        <img src="res/signupbg.png" alt="background">
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
        <div class="form-container">

            <h1 class="section-title" style="font-size:28px;">Welcome to EMPOWERED</h1>
            <p class="section-subtitle">Access your account or create a new one.</p>

            <!-- TABS -->
            <div class="tabs">
                <button id="loginTab" class="active">Log In</button>
                <button id="signupTab">Sign Up</button>
            </div>

            <!-- LOGIN -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input id="login_email" name="email" class="form-control" type="email">
                </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>

                        <div class="password-wrapper">
                            <input id="login_password" name="password"
                                class="form-control password-input"
                                type="password">

                            <button type="button"
                                    class="password-toggle"
                                    data-target="login_password">

                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                <p id="login-error" class="error-msg"></p>

                <button id="login-btn" class="btn btn-primary btn-lg" style="width:100%;">
                    Log In
                </button>
            </div>

            <!-- SIGNUP -->
            <div id="signupForm" class="auth-form">

                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input id="first_name" class="form-control" type="text">
                </div>

                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input id="last_name" class="form-control" type="text">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input id="signup_email" class="form-control" type="email">
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input id="phone" class="form-control" type="text">
                </div>

<div class="form-row">

    <div>
        <label class="form-label">Password</label>

        <div class="password-wrapper">
            <input id="password" class="form-control password-input" type="password">

            <button type="button" class="password-toggle" data-target="password">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>
    </div>

    <div>
        <label class="form-label">Confirm Password</label>

        <div class="password-wrapper">
            <input id="confirm_password" class="form-control password-input" type="password">

            <button type="button" class="password-toggle" data-target="confirm_password">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>
    </div>

</div>

                <p id="signup-error" class="error-msg"></p>

                <button id="signup-btn" class="btn btn-primary btn-lg" style="width:100%;">
                    Create Account
                </button>
            </div>

        </div>
    </div>

</div>

<script>
    const tabs = document.querySelector(".tabs");

    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");

    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    loginTab.onclick = () => {
        tabs.classList.remove("signup-active");

        loginTab.classList.add("active");
        signupTab.classList.remove("active");

        loginForm.classList.add("active");
        signupForm.classList.remove("active");
    };

    signupTab.onclick = () => {
        tabs.classList.add("signup-active");

        signupTab.classList.add("active");
        loginTab.classList.remove("active");

        signupForm.classList.add("active");
        loginForm.classList.remove("active");
    };
    
    fetch("src/check_session.php")
    .then(res => res.json())
    .then(data => {
        if (data.logged_in) {
            window.location.href = "customer.html";
        }
    });
</script>

</body>
</html>
